<div class="membership-container">

<h2>Member Management</h2>
  <div class="header">
<button mat-raised-button color="primary"  (click)="openMemberDialog()">
+ Add Member
</button>
</div>
  <!-- Member List Table -->

  <mat-divider></mat-divider>

  <h3>Recent Members</h3>

  <app-reusable-table [data]="members" [isLoading]="isLoading" [columns]="[
    { key: 'name', label: 'Name' },
    { key: 'fName', label: 'Father Name' },
    { key: 'contact', label: 'Contact' }
  ]" [showActions]="true" (edit)="openMemberEditDialog($event)" (delete)="deleteMember($event)">
    <!-- Optional custom cell template -->
    <ng-template #price let-value="value">
      ₹{{ value }}
    </ng-template>
  </app-reusable-table>


</div>
<p>admin-member works!</p>
