<div class="post-container">

  <div class="header">
    <h2>Manage Posts</h2>
    <button routerLink="/admin/add-post">Add New</button>
  </div>


  <div class="grid">

    <div class="card" *ngFor="let post of posts">

      <img [src]="post.imageUrl" alt="post image">

      <div class="content">
        <h3>{{ post.title }}</h3>
        <h2>{{ post.description | slice:0:140 }}</h2>

        <p class="location">
          📍 {{ post.location }}
        </p>

        <p class="date">
          {{ post.eventDate | date:'mediumDate' }}
        </p>
      </div>

      <div class="actions">
        <button [routerLink]="['/admin/edit-post', post.id]" class="edit-btn">
          Edit
        </button>

        <button (click)="delete(post.id)">
          Delete
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="posts.length === 0" class="empty">
    No posts available
  </div>

</div>
