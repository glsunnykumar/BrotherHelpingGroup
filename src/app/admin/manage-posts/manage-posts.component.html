<div class="post-container">

  <div class="header">
    <h2>Manage Posts</h2>
    <button routerLink="/admin/add-post">Add New</button>
  </div>

  <div class="post-grid">
    <div class="post-card" *ngFor="let post of posts">

      <img [src]="post.imageUrl" />

      <div class="content">
        <h3>{{ post.title }}</h3>
        <p>{{ post.location }}</p>
        <p>{{ post.eventDate | date }}</p>
      </div>

      <div class="actions">
        <button (click)="edit(post)">Edit</button>
        <button (click)="delete(post.id)">Delete</button>
      </div>

    </div>
  </div>

</div>
