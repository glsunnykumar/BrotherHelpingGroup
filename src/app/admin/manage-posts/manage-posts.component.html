<div class="post-container">

  <h2>Manage Posts</h2>

 <app-global-loader [loading]="isLoading"></app-global-loader>
  <div class="header">
    <button mat-raised-button color="primary" routerLink="/admin/add-post"> + Add Post</button>
  </div>

  <div class="grid">
    <div class="card" *ngFor="let post of posts">

      <img [src]="post.imageUrl" alt="post image">

      <div class="content">
        <h3>{{ post.title }}</h3>
        <h2>{{ post.description | slice:0:140 }}</h2>

        <p class="location">
          📍 {{ post.location }}
        </p>

        <p class="date">
          {{ post.eventDate | date:'mediumDate' }}
        </p>
      </div>

      <div class="actions">
        <button [routerLink]="['/admin/edit-post', post.id]" class="edit-btn">
          Edit
        </button>

        <button (click)="delete(post.id)">
          Delete
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="posts.length === 0" class="empty">
    No posts available
  </div>

</div>
