<div class="container">
  <app-global-loader *ngIf="isLoading"></app-global-loader>
  <!-- TOP BAR -->
  <div class="top-bar">

    <h2>Blogs</h2>

    <div class="actions-bar">

      <input
        type="text"
        placeholder="Search blogs..."
        [(ngModel)]="searchText"
      />

      <select [(ngModel)]="statusFilter">
        <option value="">All</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>

      <button routerLink="/admin/add-blog" class="add-btn">
        + Add Blog
      </button>

    </div>

  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="blog-card"
      *ngFor="let blog of filteredBlogs">

      <!-- IMAGE -->
      <div class="image-wrapper">

        <img [src]="blog.imageUrl || 'assets/default.jpg'">

        <span class="status" [ngClass]="blog.status || 'draft'">
          {{blog.status || 'draft'}}
        </span>

      </div>

      <!-- BODY -->
      <div class="blog-body">

        <h3>{{blog.title}}</h3>

        <p>{{blog.content | slice:0:90}}...</p>

        <div class="meta">
          <span>{{blog.author}}</span>
          <span>{{blog.createdAt?.toDate?.() | date:'mediumDate'}}</span>
        </div>

      </div>

      <!-- ACTION OVERLAY -->
      <div class="overlay">

        <button (click)="edit(blog.id)">
          <mat-icon>edit</mat-icon>
        </button>

        <button (click)="delete(blog.id)">
          <mat-icon>delete</mat-icon>
        </button>

      </div>

    </div>

  </div>

</div>
