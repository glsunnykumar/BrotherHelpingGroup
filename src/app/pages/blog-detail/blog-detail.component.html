<div class="blog-container" *ngIf="blog">

  <!-- COVER -->
  <div class="cover">
    <img [src]="blog.imageUrl">
  </div>

  <!-- HEADER -->
  <div class="header">

    <h1>{{blog.title}}</h1>

    <div class="meta">
      <span>✍️ {{blog.author}}</span>
      <span>📅 {{blog.createdAt?.toDate?.() | date:'mediumDate'}}</span>
      <span>⏱ {{readingTime}} min read</span>
    </div>

    <!-- SHARE -->
    <div class="share">
      <button (click)="share('whatsapp')">WhatsApp</button>
      <button (click)="share('facebook')">Facebook</button>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">
    {{blog.content}}
  </div>

  <!-- RELATED BLOGS -->
  <div class="related">

    <h3>Related Blogs</h3>

    <div class="related-grid">

      <!-- <div class="related-card"
        *ngFor="let item of relatedBlogs"
        (click)="open(item.id)">

        <img [src]="item.imageUrl">

        <h4>{{item.title}}</h4>

      </div> -->

    </div>

  </div>

</div>
