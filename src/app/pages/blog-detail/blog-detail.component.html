<div class="blog-container" *ngIf="blog">

  <!-- COVER IMAGE -->
  <div class="cover" *ngIf="blog.imageUrl">
    <img [src]="blog.imageUrl">
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1>{{blog.title}}</h1>

    <div class="meta">
      <span>✍️ {{blog.author}}</span>
      <span>📅 {{blog.createdAt?.toDate?.() | date:'mediumDate'}}</span>
    </div>

    <div class="divider"></div>

    <!-- BLOG TEXT -->
    <p class="text">
      {{blog.content}}
    </p>

  </div>

</div>
